<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Riwayat - PaketExpress</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Arial;background:#f0f2f5}
        .navbar{background:#fff;padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap}
        .nav-brand a{font-size:1.5rem;font-weight:bold;color:#667eea;text-decoration:none}
        .nav-menu{display:flex;list-style:none;gap:1.5rem;flex-wrap:wrap}
        .nav-menu a{text-decoration:none;color:#333}
        .container{max-width:1200px;margin:2rem auto;padding:0 1rem}
        .card{background:#fff;border-radius:10px;padding:2rem;margin-bottom:1.5rem}
        table{width:100%;border-collapse:collapse}
        th,td{padding:10px;text-align:left;border-bottom:1px solid #ddd}
        th{background:#f5f5f5}
        .btn{display:inline-block;padding:5px 10px;background:#667eea;color:#fff;text-decoration:none;border-radius:5px}
        .status-pending{background:#fef3c7;color:#d97706;padding:3px 10px;border-radius:20px;display:inline-block}
        .status-diproses{background:#dbeafe;color:#2563eb;padding:3px 10px;border-radius:20px}
        .status-dikirim{background:#d1fae5;color:#059669;padding:3px 10px;border-radius:20px}
        .status-diterima{background:#d4edda;color:#155724;padding:3px 10px;border-radius:20px}
        .status-batal{background:#fee2e2;color:#dc2626;padding:3px 10px;border-radius:20px}
        @media(max-width:768px){.table-responsive{overflow-x:auto}}
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand"><a href="/dashboard">📦 PaketExpress</a></div>
        <ul class="nav-menu">
            <li><a href="/dashboard">Dashboard</a></li>
            <li><a href="/kirim">Kirim</a></li>
            <li><a href="/lacak">Lacak</a></li>
            <li><a href="/tarif">Tarif</a></li>
            <li><a href="/riwayat">Riwayat</a></li>
            <li><a href="/profile">Profile</a></li>
            <li><a href="#" id="logoutBtn">Logout</a></li>
        </ul>
    </nav>
    <div class="container">
        <div class="card"><h1>📋 Riwayat Pengiriman</h1></div>
        <div class="card"><div id="riwayatList" style="overflow-x:auto"></div></div>
    </div>
    <script>
        const token = document.cookie.split('; ').find(r=>r.startsWith('token='));
        if(!token) window.location.href='/login';
        const tokenValue = token.split('=')[1];
        async function loadRiwayat(){
            const res=await fetch('/paket',{headers:{'Authorization':`Bearer ${tokenValue}`}});
            const data=await res.json();
            const packets = data.success&&Array.isArray(data.data)?data.data:[];
            const container=document.getElementById('riwayatList');
            if(packets.length===0){ container.innerHTML='<p>Belum ada riwayat</p>'; return; }
            container.innerHTML=`<table><tr><th>Tanggal</th><th>No Resi</th><th>Rute</th><th>Berat</th><th>Total</th><th>Status</th><th>Aksi</th></tr>
                ${packets.map(p=>`<tr>
                    <td>${new Date(p.created_at).toLocaleDateString('id-ID')}</td>
                    <td>${p.no_resi}</td>
                    <td>${p.kota_asal||'-'} → ${p.kota_tujuan||'-'}</td>
                    <td>${p.berat_kg} kg</td>
                    <td>Rp ${p.total_harga.toLocaleString('id-ID')}</td>
                    <td><span class="status-${p.status}">${p.status.toUpperCase()}</span></td>
                    <td><a href="/lacak?resi=${p.no_resi}" class="btn">Lacak</a></td>
                </tr>`).join('')}</table>`;
        }
        document.getElementById('logoutBtn').onclick=async(e)=>{e.preventDefault();await fetch('/logout',{method:'POST'});window.location.href='/login';};
        loadRiwayat();
    </script>
</body>
</html>
