<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Kirim Paket - PaketExpress</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Arial;background:#f0f2f5}
        .navbar{background:#fff;padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap}
        .nav-brand a{font-size:1.5rem;font-weight:bold;color:#667eea;text-decoration:none}
        .nav-menu{display:flex;list-style:none;gap:1.5rem;flex-wrap:wrap}
        .nav-menu a{text-decoration:none;color:#333}
        .container{max-width:800px;margin:2rem auto;padding:0 1rem}
        .card{background:#fff;border-radius:10px;padding:2rem;margin-bottom:1.5rem}
        .card h3{color:#667eea;margin:1rem 0;border-bottom:2px solid #eee;padding-bottom:0.5rem}
        .form-group{margin-bottom:1rem}
        .form-group label{display:block;margin-bottom:0.5rem;font-weight:500}
        .form-control{width:100%;padding:10px;border:1px solid #ddd;border-radius:5px}
        select.form-control{cursor:pointer}
        .row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
        .btn{width:100%;padding:12px;background:#667eea;color:#fff;border:none;border-radius:5px;cursor:pointer}
        .alert{padding:1rem;border-radius:5px;margin-bottom:1rem}
        .alert-success{background:#d4edda;color:#155724}
        .alert-danger{background:#f8d7da;color:#721c24}
        .alert-info{background:#d1ecf1;color:#0c5460}
        @media(max-width:600px){.row{grid-template-columns:1fr}}
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand"><a href="/dashboard">📦 PaketExpress</a></div>
        <ul class="nav-menu">
            <li><a href="/dashboard">Dashboard</a></li>
            <li><a href="/kirim">Kirim</a></li>
            <li><a href="/lacak">Lacak</a></li>
            <li><a href="/tarif">Tarif</a></li>
            <li><a href="/riwayat">Riwayat</a></li>
            <li><a href="/profile">Profile</a></li>
            <li><a href="#" id="logoutBtn">Logout</a></li>
        </ul>
    </nav>
    <div class="container">
        <div class="card"><h1>📤 Kirim Paket</h1><p>Isi formulir di bawah</p></div>
        <div class="card">
            <div id="successMsg" class="alert alert-success" style="display:none"></div>
            <div id="errorMsg" class="alert alert-danger" style="display:none"></div>
            <form id="kirimForm">
                <h3>📝 Pengirim</h3>
                <div class="form-group"><input type="text" id="nama_pengirim" class="form-control" placeholder="Nama Pengirim" required></div>
                <div class="form-group"><textarea id="alamat_pengirim" class="form-control" rows="2" placeholder="Alamat Pengirim" required></textarea></div>
                <div class="form-group"><input type="tel" id="telepon_pengirim" class="form-control" placeholder="No Telepon Pengirim" required></div>
                <h3>🎯 Penerima</h3>
                <div class="form-group"><input type="text" id="nama_penerima" class="form-control" placeholder="Nama Penerima" required></div>
                <div class="form-group"><textarea id="alamat_penerima" class="form-control" rows="2" placeholder="Alamat Penerima" required></textarea></div>
                <div class="form-group"><input type="tel" id="telepon_penerima" class="form-control" placeholder="No Telepon Penerima" required></div>
                <h3>📦 Detail Paket</h3>
                <div class="row">
                    <div class="form-group"><select id="kota_asal" class="form-control" required><option value="">Kota Asal</option></select></div>
                    <div class="form-group"><select id="kota_tujuan" class="form-control" required><option value="">Kota Tujuan</option></select></div>
                </div>
                <div class="form-group"><input type="number" id="berat_kg" class="form-control" step="0.1" placeholder="Berat (kg)" required></div>
                <div class="form-group"><textarea id="catatan" class="form-control" rows="2" placeholder="Catatan (opsional)"></textarea></div>
                <div id="tarifInfo" class="alert alert-info" style="display:none"></div>
                <button type="submit" class="btn">Kirim Paket</button>
            </form>
        </div>
    </div>
    <script>
        const token = document.cookie.split('; ').find(r=>r.startsWith('token='));
        if(!token) window.location.href='/login';
        const tokenValue = token.split('=')[1];
        let tarifData = [];
        async function loadKota(){
            const res=await fetch('/kota',{headers:{'Authorization':`Bearer ${tokenValue}`}});
            const data=await res.json();
            if(data.success){
                const asal=document.getElementById('kota_asal'), tujuan=document.getElementById('kota_tujuan');
                asal.innerHTML='<option value="">Kota Asal</option>';
                tujuan.innerHTML='<option value="">Kota Tujuan</option>';
                data.kota_asal?.forEach(k=>asal.innerHTML+=`<option value="${k}">${k}</option>`);
                data.kota_tujuan?.forEach(k=>tujuan.innerHTML+=`<option value="${k}">${k}</option>`);
            }
        }
        async function loadTarif(){
            const res=await fetch('/tarif',{headers:{'Authorization':`Bearer ${tokenValue}`}});
            const data=await res.json();
            if(data.success) tarifData=data.data;
        }
        function cekTarif(){
            const asal=document.getElementById('kota_asal').value, tujuan=document.getElementById('kota_tujuan').value, berat=parseFloat(document.getElementById('berat_kg').value);
            const info=document.getElementById('tarifInfo');
            if(asal&&tujuan&&berat>0){
                const tarif=tarifData.find(t=>t.kota_asal===asal&&t.kota_tujuan===tujuan);
                if(tarif){
                    info.style.display='block';
                    info.innerHTML=`💰 Ongkos Kirim: Rp ${(berat*tarif.harga_per_kg).toLocaleString('id-ID')}<br>📅 Estimasi: ${tarif.estimasi_hari} hari<br>📦 Tarif per kg: Rp ${tarif.harga_per_kg.toLocaleString('id-ID')}`;
                }else info.style.display='none';
            }else info.style.display='none';
        }
        document.getElementById('kota_asal').onchange=cekTarif;
        document.getElementById('kota_tujuan').onchange=cekTarif;
        document.getElementById('berat_kg').oninput=cekTarif;
        document.getElementById('kirimForm').onsubmit=async(e)=>{
            e.preventDefault();
            const tarif=tarifData.find(t=>t.kota_asal===document.getElementById('kota_asal').value&&t.kota_tujuan===document.getElementById('kota_tujuan').value);
            if(!tarif) return alert('Tarif tidak ditemukan');
            const res=await fetch('/paket',{
                method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${tokenValue}`},
                body:JSON.stringify({
                    idtarif:tarif.idtarif,
                    nama_pengirim:document.getElementById('nama_pengirim').value,
                    alamat_pengirim:document.getElementById('alamat_pengirim').value,
                    telepon_pengirim:document.getElementById('telepon_pengirim').value,
                    nama_penerima:document.getElementById('nama_penerima').value,
                    alamat_penerima:document.getElementById('alamat_penerima').value,
                    telepon_penerima:document.getElementById('telepon_penerima').value,
                    berat_kg:parseFloat(document.getElementById('berat_kg').value),
                    catatan:document.getElementById('catatan').value
                })
            });
            const data=await res.json();
            if(data.success){
                document.getElementById('successMsg').style.display='block';
                document.getElementById('successMsg').innerHTML=`✅ ${data.message}<br>📋 No Resi: ${data.no_resi}<br>💰 Total: Rp ${data.total_harga.toLocaleString('id-ID')}`;
                setTimeout(()=>window.location.href=`/lacak?resi=${data.no_resi}`,3000);
            }else{
                document.getElementById('errorMsg').style.display='block';
                document.getElementById('errorMsg').textContent='❌ '+data.message;
            }
        };
        document.getElementById('logoutBtn').onclick=async(e)=>{e.preventDefault();await fetch('/logout',{method:'POST'});window.location.href='/login';};
        loadKota(); loadTarif();
    </script>
</body>
</html>
