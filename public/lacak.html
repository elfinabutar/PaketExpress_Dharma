<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Lacak Paket - PaketExpress</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Arial;background:#f0f2f5}
        .navbar{background:#fff;padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap}
        .nav-brand a{font-size:1.5rem;font-weight:bold;color:#667eea;text-decoration:none}
        .nav-menu{display:flex;list-style:none;gap:1.5rem;flex-wrap:wrap}
        .nav-menu a{text-decoration:none;color:#333}
        .container{max-width:800px;margin:2rem auto;padding:0 1rem}
        .card{background:#fff;border-radius:10px;padding:2rem;margin-bottom:1.5rem}
        .form-group{margin-bottom:1rem}
        .form-control{width:100%;padding:10px;border:1px solid #ddd;border-radius:5px}
        .btn{padding:10px 20px;background:#667eea;color:#fff;border:none;border-radius:5px;cursor:pointer}
        .alert{padding:1rem;border-radius:5px;margin-bottom:1rem}
        .alert-success{background:#d4edda;color:#155724}
        .alert-danger{background:#f8d7da;color:#721c24}
        .alert-info{background:#d1ecf1;color:#0c5460}
        table{width:100%;border-collapse:collapse}
        th,td{padding:10px;text-align:left;border-bottom:1px solid #ddd}
        .status-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px}
        .status-pending{background:#fef3c7;color:#d97706}
        .status-diproses{background:#dbeafe;color:#2563eb}
        .status-dikirim{background:#d1fae5;color:#059669}
        .status-diterima{background:#d4edda;color:#155724}
        .status-batal{background:#fee2e2;color:#dc2626}
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand"><a href="/dashboard">📦 PaketExpress</a></div>
        <ul class="nav-menu">
            <li><a href="/dashboard">Dashboard</a></li>
            <li><a href="/kirim">Kirim</a></li>
            <li><a href="/lacak">Lacak</a></li>
            <li><a href="/tarif">Tarif</a></li>
            <li><a href="/riwayat">Riwayat</a></li>
            <li><a href="/profile">Profile</a></li>
            <li><a href="#" id="logoutBtn">Logout</a></li>
        </ul>
    </nav>
    <div class="container">
        <div class="card">
            <h1>🔍 Lacak Paket</h1>
            <div class="form-group">
                <input type="text" id="no_resi" class="form-control" placeholder="Masukkan Nomor Resi">
            </div>
            <button onclick="lacak()" class="btn">Lacak</button>
            <div id="result"></div>
        </div>
    </div>
    <script>
        const token = document.cookie.split('; ').find(r=>r.startsWith('token='));
        if(!token) window.location.href='/login';
        const tokenValue = token.split('=')[1];
        const urlParams = new URLSearchParams(window.location.search);
        const resiParam = urlParams.get('resi');
        if(resiParam){
            document.getElementById('no_resi').value = resiParam;
            lacak();
        }
        async function lacak(){
            const no_resi = document.getElementById('no_resi').value;
            if(!no_resi) return alert('Masukkan nomor resi');
            try{
                const res = await fetch(`/lacak/${no_resi}`,{headers:{'Authorization':`Bearer ${tokenValue}`}});
                const data = await res.json();
                const resultDiv = document.getElementById('result');
                if(data.success){
                    const p = data.data;
                    const statusClass = `status-${p.status}`;
                    resultDiv.innerHTML = `
                        <div class="alert alert-success"><h3>📦 Ditemukan!</h3></div>
                        <div class="card"><h3>Detail Paket</h3>
                        <table><tr><th>No Resi</th><td>${p.no_resi}</td></tr>
                        <tr><th>Status</th><td><span class="status-badge ${statusClass}">${p.status.toUpperCase()}</span></td></tr>
                        <tr><th>Pengirim</th><td>${p.nama_pengirim}<br>${p.alamat_pengirim}<br>${p.telepon_pengirim}</td></tr>
                        <tr><th>Penerima</th><td>${p.nama_penerima}<br>${p.alamat_penerima}<br>${p.telepon_penerima}</td></tr>
                        <tr><th>Rute</th><td>${p.kota_asal} → ${p.kota_tujuan}</td></tr>
                        <tr><th>Berat</th><td>${p.berat_kg} kg</td></tr>
                        <tr><th>Total</th><td>Rp ${p.total_harga.toLocaleString('id-ID')}</td></tr></table></div>
                        <div class="card"><h3>Riwayat Tracking</h3><table><tr><th>Waktu</th><th>Status</th><th>Lokasi</th><th>Keterangan</th></tr>
                        ${p.tracking?.map(t=>`<tr><td>${new Date(t.created_at).toLocaleString('id-ID')}</td><td>${t.status.toUpperCase()}</td><td>${t.lokasi||'-'}</td><td>${t.keterangan||'-'}</td></tr>`).join('') || '<tr><td colspan="4">Belum ada tracking</td></tr>'}
                        </table></div>`;
                }else{
                    resultDiv.innerHTML = `<div class="alert alert-danger">❌ ${data.message}</div>`;
                }
            }catch(err){
                document.getElementById('result').innerHTML = `<div class="alert alert-danger">❌ Gagal melacak paket</div>`;
            }
        }
        document.getElementById('logoutBtn').onclick=async(e)=>{e.preventDefault();await fetch('/logout',{method:'POST'});window.location.href='/login';};
    </script>
</body>
</html>
