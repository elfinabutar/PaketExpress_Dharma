<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Daftar - PaketExpress</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Arial;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
        .card{background:#fff;border-radius:10px;padding:2rem;width:100%;max-width:500px}
        h1{color:#667eea;text-align:center;margin-bottom:2rem}
        input,textarea{width:100%;padding:12px;margin:10px 0;border:1px solid #ddd;border-radius:5px}
        button{width:100%;padding:12px;background:#667eea;color:#fff;border:none;border-radius:5px;cursor:pointer}
        .error{color:#c33;margin-bottom:1rem;display:none;padding:10px;background:#fee}
        .success{color:#155724;margin-bottom:1rem;display:none;padding:10px;background:#d4edda}
        .links{text-align:center;margin-top:1rem}
    </style>
</head>
<body>
    <div class="card">
        <h1>📦 Daftar Akun</h1>
        <div id="successMsg" class="success"></div>
        <div id="errorMsg" class="error"></div>
        <form id="registerForm">
            <input type="text" id="nama" placeholder="Nama Lengkap" required>
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password" required>
            <input type="tel" id="no_telepon" placeholder="No Telepon (opsional)">
            <textarea id="alamat" rows="3" placeholder="Alamat (opsional)"></textarea>
            <button type="submit">Daftar</button>
        </form>
        <div class="links"><a href="/login">Sudah punya akun? Login</a></div>
    </div>
    <script>
        document.getElementById('registerForm').onsubmit = async (e) => {
            e.preventDefault();
            const res = await fetch('/register', {
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body:JSON.stringify({
                    nama:document.getElementById('nama').value,
                    email:document.getElementById('email').value,
                    password:document.getElementById('password').value,
                    no_telepon:document.getElementById('no_telepon').value,
                    alamat:document.getElementById('alamat').value
                })
            });
            const data = await res.json();
            if(data.success){
                document.getElementById('successMsg').style.display='block';
                document.getElementById('successMsg').textContent='✅ '+data.message;
                setTimeout(()=>window.location.href='/login',2000);
            }else{
                document.getElementById('errorMsg').style.display='block';
                document.getElementById('errorMsg').textContent='❌ '+data.message;
            }
        };
    </script>
</body>
</html>
