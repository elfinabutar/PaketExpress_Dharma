<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Login - PaketExpress</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Arial;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;display:flex;justify-content:center;align-items:center}
        .card{background:#fff;border-radius:10px;padding:2rem;width:100%;max-width:400px}
        h1{color:#667eea;text-align:center;margin-bottom:2rem}
        input{width:100%;padding:12px;margin:10px 0;border:1px solid #ddd;border-radius:5px}
        button{width:100%;padding:12px;background:#667eea;color:#fff;border:none;border-radius:5px;cursor:pointer}
        .error{color:#c33;margin-bottom:1rem;display:none;padding:10px;background:#fee;border-radius:5px}
        .links{text-align:center;margin-top:1rem}
        .links a{color:#667eea;text-decoration:none;margin:0 10px}
    </style>
</head>
<body>
    <div class="card">
        <h1>📦 PaketExpress</h1>
        <div id="errorMsg" class="error"></div>
        <form id="loginForm">
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <div class="links"><a href="/daftar">Daftar</a><a href="/lupa">Lupa Password</a></div>
    </div>
    <script>
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const res = await fetch('/login', {
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body:JSON.stringify({email:document.getElementById('email').value, password:document.getElementById('password').value})
            });
            const data = await res.json();
            if(data.success){
                window.location.href='/dashboard';
            }else{
                document.getElementById('errorMsg').style.display='block';
                document.getElementById('errorMsg').textContent='❌ '+data.message;
            }
        };
    </script>
</body>
</html>
